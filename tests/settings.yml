input_path: /ihme/homes/gphipps/onemod/experiments/kelseyMort1/config/data.parquet
ids: [location_id, age_group_id, sex_id, year_id]
id_subsets:
  super_region_id: [64, 103]
  age_group_id: [10, 11, 12, 13, 14, 15]
groupby: [sex_id]
obs: mx
pred: pred
mtype: binomial
weights: population
holdouts: [holdout1, holdout2, holdout3, holdout4, holdout5]
test: test
rover_covsel:
  groupby: [age_group_id]
  rover:
    cov_exploring:
    - adult_hiv_death_rate
    - covid_inf_pc
    - diabetes_prev_agespec
    - education_yrs_pc
    - hiv_mort_rate
    - LDI_pc
    - maternal_educ_yrs_pc
    - mean_BMI
    - sdi
    - SEV_scalar__all
    - smoking_prev
    - TB_prev
    - total_covid
    - u5_hiv_death_rate
    cov_fixed: [intercept]
  rover_fit:
    strategies: [forward]
    top_pct_learner: 0.5
    top_pct_score: 1.0
  t_threshold: 0.0
spxmod:
  groupby: [super_region_id]
  xmodel:
    lam: 2000.0
    spaces:
    - name: age_mid
      dims:
      - name: age_mid
        dim_type: numerical
    - name: region_id*age_mid
      dims:
      - name: region_id
        dim_type: categorical
      - name: age_mid
        dim_type: numerical
    - name: location_id*age_mid
      dims:
      - name: location_id
        dim_type: categorical
      - name: age_mid
        dim_type: numerical
    var_builders:
    - name: intercept
      space: age_mid
      lam: 1.0
    - name: intercept
      space: region_id*age_mid
      lam: 10.0
    - name: intercept
      space: location_id*age_mid
      lam: 10.0
    - name: spline
      space: age_mid
      lam: 100.0
    - name: spline
      space: region_id*age_mid
      lam: 10.0
    - name: spline
      space: location_id*age_mid
      lam: 10.0
    - name: covid_inf_pc
      space: age_mid
      lam: 100.0
    spline_config:
      name: year_id
      knots: [0.0, 0.33, 0.67, 1.0]
      r_linear: true
      include_first_basis: false 
  xmodel_fit:
    options:
      verbose: true
      gtol: 0.000001
      mat_solve_method: cg
kreg:
  groupby: [super_region_id]
  kreg_model:
    age_scale: 0.1
    gamma_age: 8
    gamma_year: 12
    alpha_year: 2
    exp_location: 0.25
    exp_sex: 0.25
    lam: 500
    nugget: 0.0001
  kreg_fit:
    gtol: 5e-4
    max_iter: 20
    cg_maxiter: 100
    cg_maxiter_increment: 0
    nystroem_rank: 10
  kreg_uncertainty:
    num_samples: 50
    lanczos_order: 150
ensemble:
  groupby: [super_region_id]
  metric: rmse
  score: best
